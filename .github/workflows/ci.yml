name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*", "remind-v*"]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Shared package first, then the daemon (type-check + unit tests) and the
      # plugin (type-check + bundle).
      - run: npm run build -w obsidian-now-datecore
      - run: npm run check -w obsidian-remind
      - run: npm test -w obsidian-remind
      - run: npm run build

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Keep the daemon image name stable even though the repo is obsidian-now.
          images: ghcr.io/${{ github.repository_owner }}/obsidian-remind
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      # Build context is the repo root; the daemon Dockerfile pulls in the
      # datecore workspace. Builds on PRs, pushes on push events.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: daemon/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
